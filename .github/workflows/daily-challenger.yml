# Daily paper-trading loop for the CHALLENGER bot. Independent of the champion
# (separate Alpaca account, journal, params, report). Shares the trading-loop
# concurrency group so the two never push to the repo at the same time.
name: daily-trading-loop-challenger

on:
  schedule:
    # 19:35 UTC — five minutes after the champion, same trading window.
    - cron: "35 19 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency: trading-loop

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run daily trading loop (challenger)
        env:
          CHALLENGER_ALPACA_KEY: ${{ secrets.CHALLENGER_ALPACA_KEY }}
          CHALLENGER_ALPACA_SECRET: ${{ secrets.CHALLENGER_ALPACA_SECRET }}
          ALPACA_PAPER: "true"
        run: python scripts/run_daily.py --bot challenger

      - name: Generate challenger report + champion-vs-challenger comparison
        run: |
          python scripts/run_report.py --bot challenger
          python scripts/run_compare.py

      - name: Persist challenger state + reports back to the repo
        run: |
          git config user.name "trading-bot"
          git config user.email "trading-bot@users.noreply.github.com"
          git add -A reports data
          git diff --cached --quiet || git commit -m "challenger: $(date -u +%Y-%m-%d)"
          git pull --rebase origin master
          git push
