# Daily paper-trading loop. Runs in GitHub's cloud — no local computer needed.
name: daily-trading-loop

on:
  schedule:
    # 19:30 UTC = 15:30 New York in summer, 14:30 in winter — always during
    # regular market hours, weekdays only. (Holiday checking is handled by
    # the script itself: non-sessions simply log equity and exit.)
    - cron: "30 19 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency: trading-loop

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run daily trading loop
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: "true"
        run: python scripts/run_daily.py

      - name: Persist journal back to the repo
        run: |
          git config user.name "trading-bot"
          git config user.email "trading-bot@users.noreply.github.com"
          git add data/journal.db data/live_params.json
          git diff --cached --quiet || git commit -m "journal: $(date -u +%Y-%m-%d)"
          git push
