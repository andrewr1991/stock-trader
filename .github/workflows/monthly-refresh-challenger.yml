# Monthly learning refresh for the CHALLENGER bot — re-runs its walk-forward
# and applies the parameter-level promotion gate to its own params file.
name: monthly-learning-refresh-challenger

on:
  schedule:
    - cron: "10 12 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency: trading-loop

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run learning refresh (challenger)
        run: python scripts/run_monthly_refresh.py --bot challenger

      - name: Persist decision back to the repo
        run: |
          git config user.name "trading-bot"
          git config user.email "trading-bot@users.noreply.github.com"
          git add -A data
          git diff --cached --quiet || git commit -m "challenger learning refresh: $(date -u +%Y-%m-%d)"
          git pull --rebase origin master
          git push
