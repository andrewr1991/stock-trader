# Monthly learning refresh: re-runs the walk-forward and applies the
# champion/challenger promotion gate. Runs on the 1st, so any newly promoted
# parameters govern the NEXT month-end rebalance.
name: monthly-learning-refresh

on:
  schedule:
    - cron: "0 12 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Shares the daily loop's lock so the two never push at the same time.
concurrency: trading-loop

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run learning refresh (champion vs challenger)
        run: python scripts/run_monthly_refresh.py

      - name: Persist decision back to the repo
        run: |
          git config user.name "trading-bot"
          git config user.email "trading-bot@users.noreply.github.com"
          git add data/live_params.json data/journal.db
          git diff --cached --quiet || git commit -m "learning refresh: $(date -u +%Y-%m-%d)"
          git pull --rebase origin master
          git push
