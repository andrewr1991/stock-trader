# Run the unit test suite on every push and PR. A red suite here is the early
# warning that protects both live bots from a bad change.
name: tests

on:
  push:
    branches: [master]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests -q
